services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: plantbase
      POSTGRES_USER: plantbase_rw
      POSTGRES_PASSWORD: plantbase_rw_pass
    ports:
      - '5432:5432'
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U plantbase_rw -d plantbase']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
